services:
  etf-predict:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etf-predict
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # 数据源配置
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - TINYSHARE_TOKEN=${TINYSHARE_TOKEN:-}
      - MINISHARE_TOKEN=${MINISHARE_TOKEN:-}
      - TUSHARE_PROXY_URL=${TUSHARE_PROXY_URL:-}

      # API 配置
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}

      # 认证配置
      - AUTH_KEY=${AUTH_KEY:-admin123}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}

      # 调度配置
      - UPDATE_SCHEDULE_ENABLED=${UPDATE_SCHEDULE_ENABLED:-true}
      - UPDATE_SCHEDULE_TIME=${UPDATE_SCHEDULE_TIME:-15:05}

      # 飞书通知配置
      - FEISHU_SCHEDULE_ENABLED=${FEISHU_SCHEDULE_ENABLED:-false}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
      - FEISHU_NOTIFICATION_TIMES=${FEISHU_NOTIFICATION_TIMES:-09:40,10:40,11:40,13:40,14:40}

      # 飞书机器人配置（兼容代码中的 BOT_1_ 前缀）
      - BOT_1_NAME=${BOT_1_NAME:-default}
      - BOT_1_APP_ID=${BOT_1_APP_ID}
      - BOT_1_APP_SECRET=${BOT_1_APP_SECRET}
      - BOT_1_CHAT_ID=${BOT_1_CHAT_ID}

      # 实时数据更新器配置
      - REALTIME_UPDATER_ENABLED=${REALTIME_UPDATER_ENABLED:-false}
      - REALTIME_UPDATER_START_TIME=${REALTIME_UPDATER_START_TIME:-09:25}
      - REALTIME_UPDATER_END_TIME=${REALTIME_UPDATER_END_TIME:-15:05}
      - REALTIME_UPDATER_INTERVAL=${REALTIME_UPDATER_INTERVAL:-60}

      # Python 配置
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    volumes:
      # 挂载本地目录（推荐）
      - ./data:/app/data
      - ./logs:/app/logs
      - ./optimized_weights:/app/optimized_weights
      # config.json 使用环境变量，不挂载
      # 如果需要挂载本地配置，取消下面的注释
      # - ./config.json:/app/config.json:ro
    networks:
      - etf-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  etf-data:
    driver: local
  etf-logs:
    driver: local
  etf-weights:
    driver: local
  etf-config:
    driver: local

networks:
  etf-network:
    driver: bridge
